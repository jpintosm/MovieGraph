{% extends 'base.html' %}

{% block title %}Registro | MovieGraph{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Crear cuenta</h2>

        <p class="form-description">
            Regístrate para acceder al catálogo, reseñas e historial de películas.
        </p>

        <form method="POST">
            {% csrf_token %}

            <label for="nombre">Nombre</label>
            <input 
                type="text" 
                id="nombre"
                name="nombre" 
                placeholder="Ingresa tu nombre" 
                required
            >

            <label for="email">Correo electrónico</label>
            <input 
                type="email" 
                id="email"
                name="email" 
                placeholder="ejemplo@correo.com" 
                required
            >

            <label for="password">Contraseña</label>
            <input 
                type="password" 
                id="password"
                name="password" 
                placeholder="Crea una contraseña" 
                required
            >

            <button type="submit" class="btn">
                Registrarse
            </button>
        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </p>
    </div>
</div>

{% endblock %}
