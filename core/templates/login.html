{% extends 'base.html' %}

{% block title %}Iniciar Sesión | MovieGraph{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <h2>Iniciar Sesión</h2>

        <p class="form-description">
            Accede a tu cuenta para ver películas, reseñas y recomendaciones personalizadas.
        </p>

        <form method="POST">
            {% csrf_token %}

            <label for="email">Correo electrónico</label>
            <input 
                type="email" 
                id="email"
                name="email" 
                placeholder="ejemplo@correo.com" 
                required
            >

            <label for="password">Contraseña</label>
            <input 
                type="password" 
                id="password"
                name="password" 
                placeholder="Ingresa tu contraseña" 
                required
            >

            <button type="submit" class="btn">
                Ingresar
            </button>
        </form>

        <p class="auth-link">
            ¿No tienes cuenta?
            <a href="{% url 'registro' %}">Regístrate aquí</a>
        </p>
    </div>
</div>

{% endblock %}
