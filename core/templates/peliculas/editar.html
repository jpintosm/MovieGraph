{% extends 'base.html' %}

{% block content %}
<h2>Editar Película</h2>
<form method="POST">
    {% csrf_token %}
    <input type="text" name="titulo" value="{{ pelicula.titulo }}" required><br>
    <input type="number" name="anio" value="{{ pelicula.anio }}" required><br>
    <input type="text" name="generos" value="{{ pelicula.generos|join:', ' }}"><br>
    <input type="text" name="director" value="{{ pelicula.director }}"><br>
    <input type="text" name="actores" value="{{ pelicula.actores|join:', ' }}"><br>
    <input type="text" name="poster_url" value="{{ pelicula.poster_url }}"><br>
    <button type="submit">Guardar cambios</button>
</form>
<a href="{% url 'listar_peliculas' %}">Volver</a>
{% endblock %}
